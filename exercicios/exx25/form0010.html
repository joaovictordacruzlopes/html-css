<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Formulário de Exemplo</h1>
    <form action="cadastro.php" method="get">
        <p>
            <label for="iano">Ano de nascimento:</label>
            <input type="number" id="iano" name="ano" min="1900" max="2023" value="2000" required oninput="calcidade()">
        </p>

        <p>
            <label for="iidade"> Sua Idade é: 
            </label>
             <output id="iidade">0</output>
        </p>
         

        <p>
           <input type="submit" value="Enviar">
           <input type="reset" value="Limpar">
        </p>

        </form>

        <script> 
           function calcidade(){
            let atual = new Date().getFullYear();
            iidade.innerHTML = atual - Number(iano.value);
           } 
        </script>
</body>
</html>
