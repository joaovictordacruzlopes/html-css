<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="cadastro.php" method="post">


       <p>
        <label for="iest">Estado</label>
        <select name="Estado" id="iest">
            <option value="">---Escolha---</option>
          <optgroup label="Região Sudeste">
              <option value="RJ">Rio de janeiro</option>
              <option value="SP">São Paulo</option>
              <option value="MG">Minas Gerais</option>
          </optgroup>

          <optgroup label="Região Nordeste">
              <option value="RN">Rio Grande Do Norte </option>
              <option value="PE">Pernanbuco</option>
              <option value="MA">Maranhão</option>
          </optgroup>

        </select>


       </p>
         
        <p>
            <label for="iprof">Profissão: </label>
             <input type="text" name="prof" id="iprof" list="lstprof">
             <datalist id="lstprof">
                <option value="ADM"> Administrador</option>
               <option value="CONT"> Contador</option>
                <option value="ADV"> Advogado</option>
                <option value="DEV"> Desemvolvedor</option>
             </datalist>
        </p>


       <p>

        <p>
            <label for="img"> Mensagem:</label><br>
            <textarea name="msg" id="img" cols="30" rows="10" placeholder="Sua Mensagem aqui....."></textarea>
        </p>

        <input type="submit" value="Enviar"> 
        <input type="Reset" value="Limpar" >
      </p>



















    </form>
</body>
</html>
