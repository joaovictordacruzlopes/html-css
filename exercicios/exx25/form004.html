<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplos de formulário</title>
</head>
<body>
    <form action="cadastro.php" method="get" autocomplete="on">
        
           
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <p>
                       <label for="inome">Nome</label>
                       <input type="text" name="nome" id="inome" minlength="5" maxlength="20" required>
                    </p>
                    
                    
                    
                    
                    
                            <p>
                     <label for="imail">E-mail</label>
                     <input type="email" name="mail" id="imail" required>
                    
                            </p>
                    
                            <p>
                    <label for="intel">Telefone</label>
                    <input type="tel" name="tel" id="itel" autocomplete="tel" required>
                            </p>
                </fieldset>
                        <p>
                <input type="submit" value="enviar">
                <input type="reset" value="limpar">
                        </p>
         







    </form>
</body>
</html>
