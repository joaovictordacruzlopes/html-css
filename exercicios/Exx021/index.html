<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>
    <style>

        /* Box-level: são elementos que ocupam toda a largura disponível, iniciando em uma nova linha. Exemplo: <h1>, <p>, <div>.
           Inline-level: são elementos que ocupam apenas o espaço necessário para seu conteúdo, sem iniciar uma nova linha. Exemplo: <a>, <span>, <strong>. */
    h1{ background-color:lightblue;
    height: 300px;
    width:300px;
    

    border: 10px solid rgb(255, 12, 12);
   
    padding: 20px 20px 20px 20px;

    margin: 20px auto 20px auto;   

    outline: 10px dashed rgb(255, 12, 12);

    }  
    a{
         border-width: 10px;
        border-style: solid;    
        border-color: rgb(255, 12, 12);     
    }  
    </style>
</head>
<body>
    <h1>Exemplo de box-level</h1>
    <p>paragráfos também é  são exemplos de box-level, mas os <a href="#">links são exemplos de inline-level.</a> vamos ver como isso tudo funciona.</p>
</body>
</html>
