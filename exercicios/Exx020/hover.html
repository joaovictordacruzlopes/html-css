<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        body{Font-family: arial, sans-serif;
        }
        div:hover{
            color: red;
        }
div> p{
    display: none;  }
div:hover > p{
    display: block;
    color: azure;
    background-color: rgb(42, 165, 91);
width:300px;}

    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mouse sobre o texto abaixo</p>
    <div>Passe o mouse aqui
        <p>TEXTO ESCONDIDO....</p>
    </div>
    <P>FIM DO EXEMPLO</P>
</body>
</html>
