<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: arial, sans-serif;
        }
        a{
            text-decoration: none;
            color: black;
            font-weight: bold;
        }
        a:visited{
            color: darkred;
        }
    a:hover{
        text-decoration: underline;
        color: black
    }
    a:active{
        color: blue;
    }
   .especial::before{
content: "⭐ ";     
    }
.especial::after{
    content: "⭐ ";
}
.especial{background-color:yellow;}

    a::after{content: " (link)";
text-decoration: none;
font-weight: normal;
color: gray ;


}
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>

   <ul>
    <li><a href="https://github.com" target="_blank" rel="noopener noreferrer">Repositório Github</a></li>
    <li><a href="https://youtube.com" target="_blank" rel="noopener noreferrer" class="especial">Canal do YouTube</a></li>
    <li><a href="https://cursoemvideo.com" target="_blank" rel="noopener noreferrer">Site do Cursoemvideo</a></li>

   </ul> 
</body>
</html>
